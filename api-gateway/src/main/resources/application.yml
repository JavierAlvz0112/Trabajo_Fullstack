server:
  port: 9090

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:9096
          predicates:
            - Path=/auth/**
        - id: usuarios-service
          uri: http://localhost:9094
          predicates:
            - Path=/api/usuarios/**
        - id: pagos-service
          uri: http://localhost:9093
          predicates:
            - Path=/api/pagos/**
        - id: pedidos-service
          uri: http://localhost:9092
          predicates:
            - Path=/api/pedidos/**
        - id: productos-service
          uri: http://localhost:9095
          predicates:
            - Path=/api/productos/**
        - id: almacen-service
          uri: http://localhost:9091
          predicates:
            - Path=/api/almacen/**
        - id: envios-service
          uri: http://localhost:9097
          predicates:
            - Path=/api/envios/**

logging:
  level:
    root: INFO
    com.foodtruck.api_gateway: INFO
  pattern:
    console: "%d{HH:mm:ss} %-5level [%logger{36}] %msg%n"

    