spring.application.name=usuarios-service
server.port=9094

spring.datasource.url=jdbc:mysql://localhost:3306/bd_usuarios?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.liquibase.change-log=classpath:db/db.changelog-master.sql
spring.jpa.properties.hibernate.format_sql=true


management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

logging.file.name=logs/usuarios-service.log

logging.pattern.console=%d{HH:mm:ss} %-5level [%logger{36}] %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level [%logger{36}] %msg%n
logging.level.root=INFO
logging.level.com.foodtruck.usuarios_service=INFO

springdoc.swagger-ui.path=/doc/swagger-ui.html