spring.application.name=productos-service
server.port=9095

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bd_productos?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

logging.file.name=logs/productos-service.log
logging.pattern.console=%d{HH:mm:ss} %-5level [%logger{36}] %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level [%logger{36}] %msg%n
logging.level.root=INFO
logging.level.com.foodtruck.productos_service=INFO

springdoc.swagger-ui.path=/doc/swagger-ui.html

